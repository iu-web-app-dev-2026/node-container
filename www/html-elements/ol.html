<!DOCTYPE html>
<html lang="en">
<head>
    <title>ol - Ordered List</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="container">
    <h1>ol - Ordered List</h1>
    <p>An ordered list is a list where each item is numbered.</p>
    <h2>Example</h2>
    <ol>
        <li>First item</li>
        <li>Second item</li>
        <li>Third item</li>
    </ol>
    <h2>Use on the web</h2>
    <p>Reference section in Wikipedia article, e.g. <a href="https://en.wikipedia.org/wiki/List_of_largest_cities" target="blank">Wikipedia List of largest cities</a></p>
    </div>
</body>
</html>
