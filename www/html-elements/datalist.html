<!DOCTYPE html>
<html lang="en">

<head>
    <title>Datalist</title>
    <link rel="stylesheet" href="/style.css">
</head>

<body>
    <div class="container">
        <h1>Datalist</h1>
        <p>The "datalist" HTML element contains a set of "option" elements that represent the permissible or recommended options available to choose from within other controls.</p>
        <h2>Example</h2>
        <label for="browser">Choose your browser from the list:</label>
        <input list="browsers" name="browser" id="browser">

        <datalist id="browsers">
            <option value="Edge">
            <option value="Firefox">
            <option value="Chrome">
            <option value="Opera">
            <option value="Safari">
        </datalist>
        <h2>Use on the web</h2>
        <p>Reference section in Wikipedia article, e.g. <a href="https://www.w3schools.com/Tags/tag_datalist.asp" target="blank">W3 School - datalist</a></p>
    </div>
</body>

</html>
