<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>hr - Horizontal Rule</title>
</head>
<body>
    <div class="container">
    <h1>hr - Horizontal Rule</h1>
    <p>The &lt;hr&gt; HTML element represents a thematic break between paragraph-level elements: for example, a change of scene in a story, or a shift of topic within a section.</p>
    <h2>Example</h2>
    <hr>
    <p>This is a paragraph after the horizontal rule.</p>
    </div>
</body>
</html>
