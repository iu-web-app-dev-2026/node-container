    <div class="container">
    <h1>git bisect</h1>
    <p>The <code>git bisect</code> git bisect repeatedly checks out commits between a known good commit and a known bad commit. Each time you test a commit and label it as good or bad, Git narrows the search range by half until it finds the commit responsible for the change.</p>
    <p>Example: <code>git bisect</code></p>
