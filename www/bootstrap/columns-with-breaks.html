<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bootstrap Demo</title>
  <link href="bootstrap.min.css" rel="stylesheet">
  <style>
    .row > .col:nth-of-type(odd) {
      background-color: #ddd;
    }
    .row > .col:nth-of-type(even) {
      background-color: #aaa;
    }
  </style>
</head>
<body>
  <div class="container"><div class="row row-cols-1 row-cols-sm-2 row-cols-md-3">
    <div class="col"><div>Column</div></div>
    <div class="col"><div>Another column in a row</div></div>
    <div class="col"><div>Column</div></div>
    <div class="col"><div>Another column in a row</div></div>
    <div class="col"><div>Column</div></div>
    <div class="col"><div>Another column in a row</div></div>
  </div></div>
</body>
</html>
